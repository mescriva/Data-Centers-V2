<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Centers Solution — Expo Screen</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app">

    <main class="main">

      <!-- SECCIÓN A — panel derecho: info + equipos + gráfica -->
      <aside class="section-a" id="sectionA" aria-label="Información del modelo y equipos">

        <header class="a-header">
          <div class="a-title-row">
            <h1 class="a-title">Data Centers</h1>
            <img class="a-logo" src="./assets/logo-pe.svg" alt="Power Electronics" />
          </div>
          <div class="a-badge" id="aBadge"></div>
          <p class="a-text" id="aText"></p>
          <p class="a-text" id="aText2"></p>
        </header>

        <div class="a-body" id="aBody"></div> <!-- Aqui debe de cargar los datos de app.js y data.js -->

        <section class="section-c" id="sectionC" aria-label="Gráfica del data center">
          <div class="graph-header">
            <span class="graph-label" id="graphLabel"></span>
            <span class="graph-unit" id="graphUnit"></span>
          </div>
          <img class="graph-img" id="graphImg" src="" alt="Gráfica del modelo activo" />
        </section>

      </aside><!-- /section-a -->

      <!-- SECCIÓN B — render vídeo columna izquierda -->
      <section class="right-col">
        <section class="section-b" id="sectionB" aria-label="Render del data center">
          <!-- CAMBIAR: dos videos en lugar de uno -->
          <div class="render-wrap" id="renderWrap">
            <video class="render-video" id="renderVideoA" autoplay loop muted playsinline></video>
            <video class="render-video render-video--back" id="renderVideoB" autoplay loop muted playsinline></video>
          </div>
        </section>
      </section><!-- /right-col -->

    </main>

    <nav class="section-d" id="sectionD" aria-label="Selector de modelo">
      <div class="model-nav" id="modelNav"></div>
    </nav>

  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>

</body>

</html>
